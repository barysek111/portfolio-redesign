<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" fill="none" viewBox="0 0 1920 1080"><style>text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}.module-title{font-size:12px;font-weight:600;fill:#1a1a1a}.module-body{font-size:10px;font-weight:400;fill:#3d3d3d}</style><title>Modules and actions for portal pages</title><rect width="520" height="1000" x="40" y="40" fill="#fff" stroke="#e0e0e0" stroke-width="1.25" rx="12"/><text x="300" y="68" class="module-title" font-weight="600" text-anchor="middle">Modules and actions for portal pages</text><rect width="230" height="100" x="60" y="90" fill="#e9eef2" stroke="#c5cdd6" stroke-width="1.25" rx="8"/><text x="72" y="110" class="module-title">Tables</text><text x="72" y="120" class="module-body">1. Clients</text><text x="72" y="133" class="module-body">2. Exercises</text><text x="72" y="146" class="module-body">3. Physios</text><text x="72" y="159" class="module-body">4. Teams</text><text x="72" y="172" class="module-body">5. Programs</text><rect width="230" height="100" x="310" y="90" fill="#e9eef2" stroke="#c5cdd6" stroke-width="1.25" rx="8"/><text x="322" y="110" class="module-title">Activity feeds</text><text x="322" y="126.5" class="module-body">1. Program started</text><text x="322" y="139.5" class="module-body">2. Exercises</text><text x="322" y="152.5" class="module-body">3. Goals</text><text x="322" y="165.5" class="module-body">4. Achievements</text><rect width="230" height="100" x="60" y="205" fill="#e9eef2" stroke="#c5cdd6" stroke-width="1.25" rx="8"/><text x="72" y="225" class="module-title">Data cards</text><text x="72" y="248" class="module-body">1. Compliance</text><text x="72" y="261" class="module-body">2. Pain score</text><text x="72" y="274" class="module-body">3. With and without CTA</text><rect width="230" height="100" x="310" y="205" fill="#e9eef2" stroke="#c5cdd6" stroke-width="1.25" rx="8"/><text x="322" y="225" class="module-title">Chat</text><text x="322" y="261" class="module-body">1. Chat between patients and physios</text><rect width="230" height="100" x="60" y="320" fill="#e9eef2" stroke="#c5cdd6" stroke-width="1.25" rx="8"/><text x="72" y="340" class="module-title">Create/edit data</text><text x="72" y="376" class="module-body">1. Edit actions (depend on the field)</text><rect width="230" height="100" x="310" y="320" fill="#e9eef2" stroke="#c5cdd6" stroke-width="1.25" rx="8"/><text x="322" y="340" class="module-title">Export data</text><text x="322" y="376" class="module-body">1. Export / sync actions to journal systems</text><rect width="230" height="100" x="60" y="435" fill="#e9eef2" stroke="#c5cdd6" stroke-width="1.25" rx="8"/><text x="72" y="455" class="module-title">Single pages</text><text x="72" y="491" class="module-body">1. Overview of: Client, Physio, Exercise, Team</text><rect width="230" height="100" x="310" y="435" fill="#e9eef2" stroke="#c5cdd6" stroke-width="1.25" rx="8"/><text x="322" y="455" class="module-title">Side nav</text><text x="322" y="491" class="module-body">1. Main nav</text><rect width="680" height="280" x="600" y="40" fill="#fff" stroke="#e0e0e0" stroke-width="1.25" rx="12"/><text x="940" y="68" class="module-title" font-weight="600" text-anchor="middle">User flow for patient creation/onboarding</text><text x="620" y="100" class="module-title">Physio</text><rect width="200" height="50" x="620" y="115" fill="#e9eef2" stroke="#a9b4c2" stroke-width="1.25" rx="6"/><text x="720" y="144" class="module-body" text-anchor="middle">Create a new user in portal</text><path stroke="#9ca3af" stroke-width="1.25" d="M820 140h50"/><path fill="#9ca3af" d="m870 140-7-4v8z"/><rect width="220" height="50" x="870" y="115" fill="#e9eef2" stroke="#a9b4c2" stroke-width="1.25" rx="6"/><text x="980" y="144" class="module-body" text-anchor="middle">Physio resets password to default</text><text x="620" y="200" class="module-title">Patient</text><path stroke="#9ca3af" stroke-width="1.25" d="M720 165v40"/><path fill="#9ca3af" d="m720 205-4-7h8z"/><rect width="260" height="50" x="620" y="205" fill="#b5bdc9" stroke="#a9b4c2" stroke-width="1.25" rx="6"/><text x="750" y="234" class="module-body" text-anchor="middle">Patient receives activation email and temp password</text><path stroke="#9ca3af" stroke-width="1.25" d="M880 230h20"/><path fill="#9ca3af" d="m900 230-7-4v8z"/><rect width="300" height="50" x="900" y="205" fill="#a9b4c2" stroke="#a9b4c2" stroke-width="1.25" rx="6"/><text x="1050" y="234" class="module-body" text-anchor="middle">Login with email and temp password, asked to set up new password</text><path stroke="#9ca3af" stroke-width="1.25" d="M1200 230h40"/><path fill="#9ca3af" d="m1240 230-7-4v8z"/><rect width="220" height="50" x="1240" y="205" fill="#949eb1" stroke="#a9b4c2" stroke-width="1.25" rx="6"/><text x="1350" y="234" class="module-body" text-anchor="middle">Patient can link to MitID from the app</text><rect width="680" height="360" x="600" y="340" fill="#fff" stroke="#e0e0e0" stroke-width="1.25" rx="12"/><text x="700" y="368" class="module-title" font-weight="600">Exercise flow</text><rect width="280" height="120" x="620" y="390" fill="#e9eef2" stroke="#a9b4c2" stroke-width="1.25" rx="6"/><text x="760" y="436" class="module-body" text-anchor="middle">Types of cards:</text><text x="760" y="448" class="module-body" text-anchor="middle">1. Exercise intro</text><text x="760" y="460" class="module-body" text-anchor="middle">2. Break + transition info</text><text x="760" y="472" class="module-body" text-anchor="middle">3. Exercise card</text><rect width="320" height="120" x="920" y="390" fill="#e9eef2" stroke="#a9b4c2" stroke-width="1.25" rx="6"/><text x="1080" y="436" class="module-body" text-anchor="middle">Actions to trigger next card:</text><text x="1080" y="448" class="module-body" text-anchor="middle">1. Fixed time</text><text x="1080" y="460" class="module-body" text-anchor="middle">2. X amount of reps</text><text x="1080" y="472" class="module-body" text-anchor="middle">3. Fixed video length x 3</text><text x="700" y="540" class="module-title" font-weight="600">User flow notifications</text><rect width="300" height="110" x="620" y="560" fill="#a9b4c2" stroke="#a9b4c2" stroke-width="1.25" rx="6"/><text x="770" y="601" class="module-body" text-anchor="middle">Events that trigger them:</text><text x="770" y="613" class="module-body" text-anchor="middle">1. New chats</text><text x="770" y="625" class="module-body" text-anchor="middle">2. Program updates</text><text x="770" y="637" class="module-body" text-anchor="middle">3. Training reminders</text><rect width="300" height="110" x="940" y="560" fill="#a9b4c2" stroke="#a9b4c2" stroke-width="1.25" rx="6"/><text x="1090" y="601" class="module-body" text-anchor="middle">Types of notifications:</text><text x="1090" y="613" class="module-body" text-anchor="middle">1. In app + push (patient)</text><text x="1090" y="625" class="module-body" text-anchor="middle">2. Web (physio)</text><text x="1090" y="637" class="module-body" text-anchor="middle">3. SMS (patient)</text><rect width="560" height="660" x="1320" y="40" fill="#fff" stroke="#e0e0e0" stroke-width="1.25" rx="12"/><text x="1600" y="68" class="module-title" font-weight="600" text-anchor="middle">Exercise steps</text><rect width="480" height="90" x="1360" y="100" fill="#e9eef2" stroke="#a9b4c2" stroke-width="1.25" rx="6"/><text x="1600" y="131" class="module-body" text-anchor="middle">Intro:</text><text x="1600" y="143" class="module-body" text-anchor="middle">1. Title + sets X reps</text><text x="1600" y="155" class="module-body" text-anchor="middle">2. Video</text><text x="1600" y="167" class="module-body" text-anchor="middle">3. Trigger: time</text><path stroke="#9ca3af" stroke-width="1.25" d="M1600 190v20"/><path fill="#9ca3af" d="m1600 210-4-7h8z"/><rect width="480" height="90" x="1360" y="220" fill="#a9b4c2" stroke="#a9b4c2" stroke-width="1.25" rx="6"/><text x="1600" y="263" class="module-body" text-anchor="middle">Exercise card:</text><text x="1600" y="275" class="module-body" text-anchor="middle">1. Trigger: correct reps</text><path stroke="#9ca3af" stroke-width="1.25" d="M1600 310v20"/><path fill="#9ca3af" d="m1600 330-4-7h8z"/><rect width="480" height="90" x="1360" y="340" fill="#b5bdc9" stroke="#a9b4c2" stroke-width="1.25" rx="6"/><text x="1600" y="383" class="module-body" text-anchor="middle">Break:</text><text x="1600" y="395" class="module-body" text-anchor="middle">1. Trigger: time</text><path stroke="#9ca3af" stroke-width="1.25" d="M1600 430v20"/><path fill="#9ca3af" d="m1600 450-4-7h8z"/><rect width="480" height="90" x="1360" y="460" fill="#949eb1" stroke="#a9b4c2" stroke-width="1.25" rx="6"/><text x="1600" y="509" class="module-body" text-anchor="middle">Next exercise</text><path stroke="#718096" stroke-width="1.25" d="M1840 520c40 0 40-400 0-400"/><path fill="#718096" d="m1840 120-7 7h14z"/></svg>