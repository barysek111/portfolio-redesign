hor="middle">Sets</text><text x="1402" y="846" class="wf-title" font-size="28" text-anchor="middle">15</text><text x="1402" y="876" class="wf-muted" text-anchor="middle">Reps</text><text x="1628" y="24" class="wf-label">Rest screen</text><rect width="460" height="900" x="1628" y="52" fill="#fff" stroke="#1a1a1a" stroke-width="1.5" rx="20"/><rect width="436" height="14}" x="1640" y="66" fill="#f3f4f6" rx="7"/><text x="1858" y="128" class="wf-title" font-size="22" text-anchor="middle">10s rest</text><circle cx="1858" cy="482" r="70" stroke="#e5e7eb" stroke-width="14"/><path stroke="#2d3748" stroke-linecap="round" stroke-width="14" d="M1858 412a70 70 0 0 1 70 70"/><text x="1858" y="488" class="wf-title" font-size="32" text-anchor="middle">3</text><text x="1858" y="866" class="wf-title" text-anchor="middle">Set 2/2 &gt;</text><text x="2144" y="24" class="wf-label">Pain score</text><rect width="460" height="900" x="2144" y="52" fill="#fff" stroke="#1a1a1a" stroke-width="1.5" rx="20"/><rect width="436" height="14}" x="2156" y="66" fill="#f3f4f6" rx="7"/><rect width="48" height="48" x="2350" y="88" fill="#fff" stroke="#d1d5db" stroke-width="1.25" rx="4"/><path stroke="#cbd5e1" stroke-width="1.5" d="m2358 96 32 32M2390 96l-32 32"/><text x="2374" y="158" class="wf-title" font-size="18" text-anchor="middle">Good job!</text><text x="2374" y="180" class="wf-muted" text-anchor="middle">Feedback text</text><rect width="436" height="280" x="2156" y="198" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.25" rx="8"/><text x="2170" y="218" class="wf-body">Squat</text><rect width="356" height="8" x="2170" y="232" fill="#e5e7eb" stroke-width="1.25" rx="4"/><rect width="320.4" height="8" x="2170" y="232" fill="#2d3748" stroke-width="1.25" rx="4"/><text x="2572" y="226" class="wf-muted" text-anchor="middle">90%</text><text x="2170" y="266" class="wf-body">Sit to stand</text><rect width="356" height="8" x="2170" y="280" fill="#e5e7eb" stroke-width="1.25" rx="4"/><rect width="178" height="8" x="2170" y="280" fill="#2d3748" stroke-width="1.25" rx="4"/><text x="2572" y="274" class="wf-muted" text-anchor="middle">50%</text><text x="2170" y="314" class="wf-body">Lunge</text><rect width="356" height="8" x="2170" y="328" fill="#e5e7eb" stroke-width="1.25" rx="4"/><rect width="356" height="8" x="2170" y="328" fill="#2d3748" stroke-width="1.25" rx="4"/><text x="2572" y="322" class="wf-muted" text-anchor="middle">100%</text><text x="2170" y="362" class="wf-body">Hip abduction left</text><rect width="356" height="8" x="2170" y="376" fill="#e5e7eb" stroke-width="1.25" rx="4"/><rect width="320.4" height="8" x="2170" y="376" fill="#2d3748" stroke-width="1.25" rx="4"/><text x="2572" y="370" class="wf-muted" text-anchor="middle">90%</text><text x="2170" y="410" class="wf-body">Hip abduction right</text><rect width="356" height="8" x="2170" y="424" fill="#e5e7eb" stroke-width="1.25" rx="4"/><rect width="320.4" height="8" x="2170" y="424" fill="#2d3748" stroke-width="1.25" rx="4"/><text x="2572" y="418" class="wf-muted" text-anchor="middle">90%</text><rect width="120" height="36" x="2314" y="866" fill="#2d3748" stroke="#2d3748" stroke-width="1.25" rx="18"/><text x="2374" y="888" fill="#fff" class="wf-body" text-anchor="middle">Confirm</text></svg>