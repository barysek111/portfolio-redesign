<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1042" fill="none" viewBox="0 0 2560 1042"><style>text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}.wf-label,.wf-title{font-size:14px;font-weight:600;fill:#1a1a1a}.wf-title{font-size:13px}.wf-body,.wf-muted{font-size:11px;font-weight:400;fill:#4a4a4a}.wf-muted{font-size:10px;fill:#6b6b6b}</style><text x="80" y="24" class="wf-label">Equipment instructions</text><rect width="460" height="900" x="80" y="52" fill="#fff" stroke="#1a1a1a" stroke-width="1.5" rx="20"/><rect width="436" height="14}" x="92" y="66" fill="#f3f4f6" rx="7"/><text x="108" y="96" class="wf-title">‹</text><text x="310" y="100" class="wf-title" text-anchor="middle">Equipment</text><text x="104" y="124" class="wf-body">For this exercise session you will need:</text><rect width="210" height="130" x="92" y="158" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.25" rx="8"/><text x="102" y="176" class="wf-title">Dumbbell</text><rect width="80" height="80" x="112" y="198" fill="#fff" stroke="#d1d5db" stroke-width="1.25" rx="4"/><path stroke="#cbd5e1" stroke-width="1.5" d="m120 206 64 64M184 206l-64 64"/><rect width="210" height="130" x="314" y="158" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.25" rx="8"/><text x="324" y="176" class="wf-title">Mat</text><rect width="80" height="80" x="334" y="198" fill="#fff" stroke="#d1d5db" stroke-width="1.25" rx="4"/><path stroke="#cbd5e1" stroke-width="1.5" d="m342 206 64 64M406 206l-64 64"/><rect width="210" height="130" x="92" y="308" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.25" rx="8"/><text x="102" y="326" class="wf-title">Kettlebell</text><rect width="80" height="80" x="112" y="348" fill="#fff" stroke="#d1d5db" stroke-width="1.25" rx="4"/><path stroke="#cbd5e1" stroke-width="1.5" d="m120 356 64 64M184 356l-64 64"/><rect width="210" height="130" x="314" y="308" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.25" rx="8"/><text x="324" y="326" c