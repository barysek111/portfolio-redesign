<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" role="img" aria-labelledby="title desc">
  <title id="title">Conversational Ease wireframe</title>
  <desc id="desc">Chat-forward invoice approval with copilot thread.</desc>
  <rect width="600" height="400" fill="#fafafa"/>

  <!-- sidebar -->
  <rect x="0" y="0" width="52" height="400" fill="#fafafa"/>
  <line x1="52" y1="0" x2="52" y2="400" stroke="#e8e8e8" stroke-width="1"/>
  <circle cx="26" cy="28" r="10" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="26" y="32" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#666666">P</text>
  <circle cx="26" cy="64" r="11" fill="#8a8a8a"/>
  <circle cx="26" cy="96" r="11" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <circle cx="26" cy="128" r="11" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>

  <!-- top bar -->
  <rect x="72" y="20" width="220" height="28" rx="14" fill="#f0f0f0"/>
  <text x="84" y="38" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#a3a3a3">search invoices…</text>
  <circle cx="556" cy="34" r="10" fill="#e0e0e0"/>
  <text x="536" y="38" text-anchor="end" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="500" fill="#666666">maria k.</text>

  <!-- invoice context -->
  <rect x="72" y="60" width="496" height="40" rx="12" fill="#f0f0f0"/>
  <text x="84" y="78" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#666666">invoice #2847 · nordtech as</text>
  <text x="84" y="90" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">€4,280 · due 28 jun · po #4421</text>
  <rect x="472" y="70" width="80" height="20" rx="10" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="512" y="83" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="500" fill="#888888">needs review</text>

  <!-- chat area -->
  <rect x="72" y="112" width="496" height="268" rx="14" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="88" y="136" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#666666">copilot</text>
  <text x="88" y="150" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">guided review for this invoice</text>

  <rect x="88" y="164" width="280" height="60" rx="12" fill="#f0f0f0"/>
  <text x="100" y="182" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#666666">this invoice matches po #4421.</text>
  <text x="100" y="194" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">vendor, amount, and line items align.</text>
  <text x="100" y="206" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">no duplicates found. ready to approve?</text>

  <rect x="88" y="236" width="68" height="22" rx="11" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="122" y="250" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="500" fill="#888888">approve now</text>
  <rect x="164" y="236" width="80" height="22" rx="11" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="204" y="250" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="500" fill="#888888">show po detail</text>
  <rect x="252" y="236" width="72" height="22" rx="11" fill="#8a8a8a"/>
  <text x="288" y="250" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="500" fill="#fafafa">flag review</text>

  <!-- composer -->
  <rect x="88" y="336" width="400" height="28" rx="14" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>
  <text x="100" y="354" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">ask about this invoice…</text>
  <rect x="496" y="336" width="56" height="28" rx="14" fill="#8a8a8a"/>
  <text x="524" y="354" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="500" fill="#fafafa">send</text>
</svg>
