<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" role="img" aria-labelledby="title desc">
  <title id="title">Control Room wireframe</title>
  <desc id="desc">Data-forward dashboard with KPI tiles and invoice table.</desc>
  <rect width="600" height="400" fill="#fafafa"/>

  <!-- sidebar -->
  <rect x="0" y="0" width="52" height="400" fill="#fafafa"/>
  <line x1="52" y1="0" x2="52" y2="400" stroke="#e8e8e8" stroke-width="1"/>
  <circle cx="26" cy="28" r="10" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="26" y="32" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#666666">P</text>
  <circle cx="26" cy="64" r="11" fill="#8a8a8a"/>
  <circle cx="26" cy="96" r="11" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <circle cx="26" cy="128" r="11" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>

  <!-- header -->
  <text x="72" y="38" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#666666">good morning, maria</text>
  <text x="72" y="52" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">invoice approval overview · today</text>
  <rect x="492" y="24" width="76" height="28" rx="14" fill="#8a8a8a"/>
  <text x="530" y="42" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="500" fill="#fafafa">export report</text>

  <!-- KPIs -->
  <rect x="72" y="68" width="116" height="48" rx="12" fill="#f0f0f0"/>
  <text x="84" y="84" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">pending</text>
  <text x="84" y="104" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600" fill="#666666">24</text>

  <rect x="196" y="68" width="116" height="48" rx="12" fill="#f0f0f0"/>
  <text x="208" y="84" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">auto-matched</text>
  <text x="208" y="104" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600" fill="#666666">18</text>

  <rect x="320" y="68" width="116" height="48" rx="12" fill="#f0f0f0"/>
  <text x="332" y="84" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">needs review</text>
  <text x="332" y="104" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600" fill="#666666">5</text>

  <rect x="444" y="68" width="124" height="48" rx="12" fill="#f0f0f0"/>
  <text x="456" y="84" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">blocked</text>
  <text x="456" y="104" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600" fill="#666666">1</text>

  <!-- filters -->
  <rect x="72" y="128" width="496" height="28" rx="14" fill="#f0f0f0"/>
  <rect x="80" y="136" width="36" height="12" rx="6" fill="#8a8a8a"/>
  <text x="98" y="145" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="500" fill="#fafafa">all</text>
  <text x="128" y="145" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">pending</text>
  <text x="176" y="145" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">matched</text>
  <text x="224" y="145" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">blocked</text>
  <text x="272" y="145" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">overdue</text>

  <!-- table -->
  <rect x="72" y="168" width="496" height="112" rx="14" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="84" y="186" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="500" fill="#a3a3a3">vendor</text>
  <text x="200" y="186" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="500" fill="#a3a3a3">amount</text>
  <text x="296" y="186" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="500" fill="#a3a3a3">status</text>
  <text x="392" y="186" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="500" fill="#a3a3a3">due</text>
  <text x="488" y="186" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="500" fill="#a3a3a3">owner</text>
  <line x1="84" y1="190" x2="556" y2="190" stroke="#ececec" stroke-width="1"/>

  <text x="84" y="208" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#666666">nordtech as</text>
  <text x="200" y="208" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#888888">€4,280</text>
  <rect x="296" y="200" width="48" height="14" rx="7" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="320" y="210" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="6" font-weight="500" fill="#888888">review</text>
  <text x="392" y="208" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#888888">28 jun</text>
  <text x="488" y="208" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#888888">maria k.</text>

  <line x1="84" y1="218" x2="556" y2="218" stroke="#ececec" stroke-width="1"/>
  <text x="84" y="236" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#666666">cloudserve ltd</text>
  <text x="200" y="236" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#888888">€1,120</text>
  <rect x="296" y="228" width="48" height="14" rx="7" fill="#8a8a8a"/>
  <text x="320" y="238" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="6" font-weight="500" fill="#fafafa">matched</text>
  <text x="392" y="236" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#888888">30 jun</text>
  <text x="488" y="236" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#888888">maria k.</text>

  <line x1="84" y1="246" x2="556" y2="246" stroke="#ececec" stroke-width="1"/>
  <text x="84" y="264" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#666666">printhouse ab</text>
  <text x="200" y="264" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#888888">€890</text>
  <rect x="296" y="256" width="48" height="14" rx="7" fill="#e8e8e8"/>
  <text x="320" y="266" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="6" font-weight="500" fill="#a3a3a3">blocked</text>
  <text x="392" y="264" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#888888">25 jun</text>
  <text x="488" y="264" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#888888">jonas p.</text>

  <!-- charts -->
  <rect x="72" y="292" width="240" height="96" rx="12" fill="#f0f0f0"/>
  <text x="84" y="310" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#666666">auto-matched invoice rate</text>
  <polyline points="84,360 108,348 132,352 156,336 180,340 204,328 228,332" fill="none" stroke="#b0b0b0" stroke-width="1.25" stroke-linecap="round"/>

  <rect x="328" y="292" width="240" height="96" rx="12" fill="#f0f0f0"/>
  <text x="340" y="310" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#666666">exception rate</text>
  <rect x="340" y="348" width="8" height="24" rx="2" fill="#d8d8d8"/>
  <rect x="356" y="336" width="8" height="36" rx="2" fill="#b0b0b0"/>
  <rect x="372" y="356" width="8" height="16" rx="2" fill="#d8d8d8"/>
  <rect x="388" y="324" width="8" height="48" rx="2" fill="#8a8a8a"/>
  <rect x="404" y="340" width="8" height="32" rx="2" fill="#b0b0b0"/>
  <rect x="420" y="352" width="8" height="20" rx="2" fill="#d8d8d8"/>
</svg>
