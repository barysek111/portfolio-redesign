<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" role="img" aria-labelledby="title desc">
  <title id="title">Decision Card wireframe</title>
  <desc id="desc">Minimal scannable direction with queue and decision card.</desc>
  <rect width="600" height="400" fill="#fafafa"/>

  <!-- sidebar -->
  <rect x="0" y="0" width="52" height="400" fill="#fafafa"/>
  <line x1="52" y1="0" x2="52" y2="400" stroke="#e8e8e8" stroke-width="1"/>
  <circle cx="26" cy="28" r="10" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="26" y="32" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#666666">P</text>
  <circle cx="26" cy="64" r="11" fill="#8a8a8a"/>
  <circle cx="26" cy="96" r="11" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>

  <!-- header -->
  <rect x="72" y="20" width="180" height="28" rx="14" fill="#f0f0f0"/>
  <text x="84" y="38" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#a3a3a3">search queue…</text>
  <circle cx="556" cy="34" r="10" fill="#e0e0e0"/>
  <text x="536" y="38" text-anchor="end" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="500" fill="#666666">maria k.</text>

  <!-- KPIs -->
  <rect x="72" y="60" width="152" height="36" rx="12" fill="#f0f0f0"/>
  <text x="84" y="74" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">pending</text>
  <text x="84" y="88" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#666666">24</text>

  <rect x="232" y="60" width="152" height="36" rx="12" fill="#f0f0f0"/>
  <text x="244" y="74" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">needs review</text>
  <text x="244" y="88" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#666666">5</text>

  <rect x="392" y="60" width="176" height="36" rx="12" fill="#f0f0f0"/>
  <text x="404" y="74" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">blocked</text>
  <text x="404" y="88" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#666666">1</text>

  <!-- queue -->
  <rect x="72" y="108" width="148" height="272" rx="14" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="84" y="130" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#666666">your queue</text>

  <rect x="80" y="142" width="132" height="40" rx="10" fill="#f0f0f0"/>
  <text x="90" y="158" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#666666">nordtech as</text>
  <text x="90" y="170" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">€4,280 · #2847</text>
  <rect x="164" y="152" width="44" height="14" rx="7" fill="#8a8a8a"/>
  <text x="186" y="162" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="6" font-weight="500" fill="#fafafa">matched</text>

  <rect x="80" y="190" width="132" height="40" rx="10" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="90" y="206" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#666666">cloudserve ltd</text>
  <text x="90" y="218" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">€1,120 · #2851</text>
  <rect x="164" y="200" width="44" height="14" rx="7" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="186" y="210" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="6" font-weight="500" fill="#888888">review</text>

  <rect x="80" y="238" width="132" height="40" rx="10" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="90" y="254" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#666666">printhouse ab</text>
  <text x="90" y="266" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">€890 · #2839</text>
  <rect x="164" y="248" width="44" height="14" rx="7" fill="#e8e8e8"/>
  <text x="186" y="258" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="6" font-weight="500" fill="#a3a3a3">blocked</text>

  <!-- decision card -->
  <rect x="232" y="108" width="336" height="272" rx="14" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="248" y="134" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#666666">nordtech as</text>
  <text x="248" y="150" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">invoice #2847 · auto-matched</text>
  <rect x="248" y="158" width="72" height="18" rx="9" fill="#f0f0f0"/>
  <text x="284" y="170" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="500" fill="#888888">high confidence</text>

  <line x1="248" y1="178" x2="552" y2="178" stroke="#ececec" stroke-width="1"/>

  <text x="248" y="192" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">amount</text>
  <text x="340" y="192" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#666666">€4,280.00</text>
  <text x="248" y="206" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">po reference</text>
  <text x="340" y="206" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#666666">#4421</text>
  <text x="248" y="220" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">due date</text>
  <text x="340" y="220" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#666666">28 jun 2026</text>
  <text x="248" y="234" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">cost center</text>
  <text x="340" y="234" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#666666">marketing · q2</text>

  <rect x="248" y="248" width="304" height="40" rx="10" fill="#f0f0f0"/>
  <text x="260" y="262" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#666666">copilot summary</text>
  <text x="260" y="274" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">matches po within 2%. vendor verified.</text>
  <text x="260" y="284" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">no duplicates. safe to approve.</text>

  <rect x="248" y="300" width="76" height="28" rx="14" fill="#8a8a8a"/>
  <text x="286" y="318" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#fafafa">approve</text>
  <rect x="332" y="300" width="68" height="28" rx="14" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <text x="366" y="318" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#888888">reject</text>

  <!-- composer -->
  <rect x="248" y="340" width="256" height="28" rx="14" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>
  <text x="260" y="358" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#a3a3a3">ask about this invoice…</text>
  <rect x="512" y="340" width="56" height="28" rx="14" fill="#8a8a8a"/>
  <text x="540" y="358" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="500" fill="#fafafa">send</text>
</svg>
