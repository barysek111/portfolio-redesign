<svg xmlns="http://www.w3.org/2000/svg" width="600" height="280" viewBox="0 0 600 280" role="img" aria-labelledby="title desc">
  <title id="title">Control Room user flow</title>
  <desc id="desc">User flow for data-forward dashboard direction.</desc>
  <defs>
    <style>
      .label { font-family: Inter, system-ui, sans-serif; font-size: 9px; font-weight: 400; }
      .hint { font-family: Inter, system-ui, sans-serif; font-size: 7px; font-weight: 400; font-style: italic; fill: #F4442D; }
    </style>
  </defs>

  <rect width="600" height="280" fill="#f3f3f3"/>

  <!-- connectors -->
  <path d="M 100 132 H 116 Q 124 132 124 124 V 108 Q 124 100 132 100 H 148" fill="none" stroke="#c8c8c8" stroke-width="1.25" stroke-linecap="round"/>
  <path d="M 100 132 H 116 Q 124 132 124 140 V 156 Q 124 164 132 164 H 148" fill="none" stroke="#c8c8c8" stroke-width="1.25" stroke-linecap="round"/>
  <path d="M 244 100 H 260 Q 268 100 268 108 V 124 Q 268 132 276 132 H 292" fill="none" stroke="#c8c8c8" stroke-width="1.25" stroke-linecap="round"/>
  <path d="M 244 164 H 260 Q 268 164 268 156 V 140 Q 268 132 276 132 H 292" fill="none" stroke="#c8c8c8" stroke-width="1.25" stroke-linecap="round"/>
  <path d="M 388 132 H 404 Q 412 132 412 124 V 108 Q 412 100 420 100 H 428" fill="none" stroke="#c8c8c8" stroke-width="1.25" stroke-linecap="round"/>
  <path d="M 388 132 H 404 Q 412 132 412 140 V 156 Q 412 164 420 164 H 428" fill="none" stroke="#c8c8c8" stroke-width="1.25" stroke-linecap="round"/>
  <path d="M 508 100 H 520 Q 528 100 528 108 V 124 Q 528 132 536 132" fill="none" stroke="#c8c8c8" stroke-width="1.25" stroke-linecap="round"/>
  <path d="M 508 164 H 520 Q 528 164 528 156 V 140 Q 528 132 536 132" fill="none" stroke="#c8c8c8" stroke-width="1.25" stroke-linecap="round"/>

  <rect x="40" y="116" width="60" height="32" rx="16" fill="#2d2d2d"/>
  <text x="70" y="136" text-anchor="middle" class="label" fill="#ffffff">Start</text>

  <rect x="148" y="84" width="96" height="32" rx="16" fill="#2d2d2d"/>
  <text x="196" y="104" text-anchor="middle" class="label" fill="#ffffff">Dashboard</text>

  <rect x="148" y="148" width="96" height="32" rx="16" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
  <text x="196" y="168" text-anchor="middle" class="label" fill="#555555">Apply filter</text>

  <!-- action diamond -->
  <polygon points="268,132 300,100 332,132 300,164" fill="#2d2d2d"/>
  <text x="300" y="136" text-anchor="middle" class="label" fill="#ffffff">Action</text>

  <rect x="292" y="116" width="96" height="32" rx="16" fill="#2d2d2d"/>
  <text x="340" y="136" text-anchor="middle" class="label" fill="#ffffff">Select row</text>
  <text x="340" y="162" class="hint" text-anchor="middle">Click: invoice row</text>

  <!-- grouped actions -->
  <rect x="412" y="76" width="96" height="112" rx="14" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
  <rect x="428" y="92" width="64" height="28" rx="14" fill="#2d2d2d"/>
  <text x="460" y="110" text-anchor="middle" class="label" fill="#ffffff">Bulk approve</text>
  <rect x="428" y="144" width="64" height="28" rx="14" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
  <text x="460" y="162" text-anchor="middle" class="label" fill="#555555">Export report</text>

  <rect x="500" y="116" width="56" height="32" rx="16" fill="#F4442D"/>
  <text x="528" y="136" text-anchor="middle" class="label" fill="#ffffff">Done</text>
</svg>
